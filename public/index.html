<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LPL Scorer - League Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>🏏 LPL Scorer</h1>
      <p>Cricket league manager with teams, players, auction and game mode</p>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Team CRUD</h2>
        <form id="teamForm" class="form-row">
          <input id="teamName" placeholder="Team name" required />
          <button type="submit">Create Team</button>
        </form>
        <div id="teamsGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2>Player CRUD</h2>
        <form id="playerForm" class="form-row wrap">
          <input id="playerName" placeholder="Player name" required />
          <input id="playerRole" placeholder="Role (RHB/LHB/Bowler)" required />
          <input id="playerPower" type="number" min="1" max="100" placeholder="Power 1-100" required />
          <input id="playerConsistency" type="number" min="1" max="100" placeholder="Consistency 1-100" required />
          <select id="playerTeamId">
            <option value="">Auction Pool</option>
          </select>
          <button type="submit">Create Player</button>
        </form>
        <div id="playersGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2>Auction</h2>
        <div id="auctionGrid" class="grid"></div>
      </section>

      <section class="card">
        <h2>Game Mode</h2>
        <div class="form-row">
          <select id="gameTeamSelect"></select>
          <select id="gamePlayerSelect"></select>
          <button id="startGameBtn">Start Match</button>
        </div>
        <p id="gameStatus" class="muted"></p>
      </section>
    </main>

    <template id="teamCardTemplate">
      <article class="item-card">
        <h3 class="name"></h3>
        <p class="muted members"></p>
        <div class="actions">
          <button data-action="edit">Edit</button>
          <button data-action="delete" class="danger">Delete</button>
        </div>
      </article>
    </template>

    <template id="playerCardTemplate">
      <article class="item-card">
        <h3 class="name"></h3>
        <p class="muted meta"></p>
        <p class="muted team"></p>
        <div class="actions">
          <button data-action="edit">Edit</button>
          <button data-action="delete" class="danger">Delete</button>
          <button data-action="release" class="warn">Release Player</button>
        </div>
      </article>
    </template>

    <template id="auctionCardTemplate">
      <article class="item-card auction-card">
        <h3 class="name"></h3>
        <p class="muted ratings"></p>
        <p class="muted bid"></p>
        <div class="form-row wrap">
          <select class="bid-team"></select>
          <input class="bid-amount" type="number" min="1" placeholder="Bid amount" />
        </div>
        <div class="actions">
          <button data-action="bid">Place Bid</button>
          <button data-action="sold" class="success">Mark SOLD</button>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
